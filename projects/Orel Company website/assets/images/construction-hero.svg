<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="800" height="250" fill="#87CEEB"/>
  
  <!-- Clouds -->
  <ellipse cx="100" cy="50" rx="40" ry="25" fill="#FFFFFF" opacity="0.7"/>
  <ellipse cx="140" cy="60" rx="35" ry="20" fill="#FFFFFF" opacity="0.7"/>
  <ellipse cx="600" cy="80" rx="50" ry="30" fill="#FFFFFF" opacity="0.6"/>
  
  <!-- Ground -->
  <rect y="250" width="800" height="150" fill="#8B7355"/>
  
  <!-- Construction Crane -->
  <g>
    <!-- Crane post -->
    <rect x="650" y="100" width="8" height="200" fill="#333"/>
    <!-- Crane arm -->
    <rect x="500" y="115" width="170" height="6" fill="#333"/>
    <!-- Crane hook -->
    <rect x="705" y="120" width="3" height="30" fill="#666"/>
    <circle cx="707" cy="150" r="4" fill="#FF6B35"/>
  </g>
  
  <!-- Buildings under construction -->
  <g>
    <!-- Building 1 -->
    <rect x="100" y="200" width="120" height="150" fill="#CC8844" stroke="#8B6F47" stroke-width="2"/>
    <!-- Windows -->
    <rect x="115" y="220" width="15" height="15" fill="#87CEEB"/>
    <rect x="145" y="220" width="15" height="15" fill="#87CEEB"/>
    <rect x="115" y="250" width="15" height="15" fill="#87CEEB"/>
    <rect x="145" y="250" width="15" height="15" fill="#87CEEB"/>
    <rect x="115" y="280" width="15" height="15" fill="#87CEEB"/>
    <rect x="145" y="280" width="15" height="15" fill="#87CEEB"/>
  </g>
  
  <!-- Road -->
  <rect x="200" y="320" width="400" height="80" fill="#444"/>
  <!-- Road markings -->
  <line x1="280" y1="350" x2="580" y2="350" stroke="#FFD700" stroke-width="3" stroke-dasharray="20,20"/>
  
  <!-- Construction equipment -->
  <g>
    <!-- Bulldozer simplified -->
    <rect x="50" y="310" width="60" height="40" fill="#FF6B35"/>
    <circle cx="65" cy="350" r="12" fill="#333"/>
    <circle cx="95" cy="350" r="12" fill="#333"/>
    <polygon points="110,320 120,315 120,340" fill="#FF6B35"/>
  </g>
  
  <!-- Workers (simple figures) -->
  <g>
    <circle cx="320" cy="290" r="4" fill="#FFB6C1"/>
    <rect x="318" y="295" width="4" height="20" fill="#FFD700"/>
    <rect x="315" y="295" width="2" height="12" fill="#333"/>
    <rect x="323" y="295" width="2" height="12" fill="#333"/>
  </g>
  
  <g>
    <circle cx="380" cy="295" r="4" fill="#FFB6C1"/>
    <rect x="378" y="300" width="4" height="20" fill="#0066CC"/>
    <rect x="375" y="300" width="2" height="12" fill="#333"/>
    <rect x="383" y="300" width="2" height="12" fill="#333"/>
  </g>
</svg>