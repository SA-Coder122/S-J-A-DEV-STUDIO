<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="500" height="180" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect y="180" width="500" height="120" fill="#90EE90"/>
  
  <!-- Road/Infrastructure -->
  <rect x="50" y="160" width="400" height="100" fill="#444"/>
  
  <!-- Road markings -->
  <line x1="100" y1="190" x2="450" y2="190" stroke="#FFD700" stroke-width="4" stroke-dasharray="30,20"/>
  
  <!-- Lane edges -->
  <line x1="50" y1="160" x2="450" y2="160" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="50" y1="260" x2="450" y2="260" stroke="#FFFFFF" stroke-width="3"/>
  
  <!-- Completed section (better quality) -->
  <rect x="50" y="200" width="150" height="60" fill="#333" opacity="0.8"/>
  <text x="125" y="235" font-family="Arial" font-size="12" fill="#4CAF50" font-weight="bold" text-anchor="middle">COMPLETED</text>
  
  <!-- In progress section -->
  <rect x="250" y="200" width="150" height="60" fill="#FF9800" opacity="0.6"/>
  <text x="325" y="235" font-family="Arial" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">IN PROGRESS</text>
  
  <!-- Planned section -->
  <rect x="420" y="200" width="80" height="60" fill="#CCCCCC" opacity="0.7"/>
  <text x="460" y="235" font-family="Arial" font-size="10" fill="#666" font-weight="bold" text-anchor="middle">PLANNED</text>
  
  <!-- Construction sign -->
  <rect x="30" y="50" width="60" height="80" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <text x="60" y="80" font-family="Arial" font-size="20" fill="#333" font-weight="bold" text-anchor="middle">!</text>
  <text x="60" y="115" font-family="Arial" font-size="9" fill="#333" font-weight="bold" text-anchor="middle">Road Work</text>
</svg>