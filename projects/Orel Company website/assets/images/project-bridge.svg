<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="500" height="150" fill="#87CEEB"/>
  
  <!-- Water/valley -->
  <ellipse cx="250" cy="220" rx="180" ry="60" fill="#4A90E2" opacity="0.6"/>
  <path d="M 50 200 Q 250 250 450 200" stroke="#2E5C8A" stroke-width="2" fill="#4A90E2" opacity="0.4"/>
  
  <!-- Ground -->
  <rect y="200" width="500" height="100" fill="#8B7355"/>
  
  <!-- Bridge structure -->
  <g>
    <!-- Left support tower -->
    <rect x="60" y="120" width="20" height="120" fill="#666" stroke="#333" stroke-width="2"/>
    <polygon points="50,120 80,120 85,110 45,110" fill="#777"/>
    
    <!-- Right support tower -->
    <rect x="420" y="120" width="20" height="120" fill="#666" stroke="#333" stroke-width="2"/>
    <polygon points="410,120 440,120 445,110 405,110" fill="#777"/>
    
    <!-- Bridge deck -->
    <rect x="80" y="135" width="340" height="15" fill="#CC8844" stroke="#8B6F47" stroke-width="2"/>
    
    <!-- Bridge railings -->
    <line x1="80" y1="135" x2="80" y2="110" stroke="#666" stroke-width="3"/>
    <line x1="420" y1="135" x2="420" y2="110" stroke="#666" stroke-width="3"/>
    <line x1="80" y1="110" x2="420" y2="110" stroke="#666" stroke-width="3"/>
    
    <!-- Decorative railings -->
    <line x1="130" y1="135" x2="130" y2="125" stroke="#888" stroke-width="2"/>
    <line x1="180" y1="135" x2="180" y2="125" stroke="#888" stroke-width="2"/>
    <line x1="230" y1="135" x2="230" y2="125" stroke="#888" stroke-width="2"/>
    <line x1="280" y1="135" x2="280" y2="125" stroke="#888" stroke-width="2"/>
    <line x1="330" y1="135" x2="330" y2="125" stroke="#888" stroke-width="2"/>
    <line x1="380" y1="135" x2="380" y2="125" stroke="#888" stroke-width="2"/>
  </g>
  
  <!-- Road on bridge -->
  <rect x="80" y="140" width="340" height="8" fill="#444"/>
  <line x1="80" y1="144" x2="420" y2="144" stroke="#FFD700" stroke-width="2" stroke-dasharray="20,15"/>
  
  <!-- Label -->
  <text x="250" y="30" font-family="Arial" font-size="18" fill="#333" font-weight="bold" text-anchor="middle">Bridge Construction Project</text>
  
  <!-- Status badge -->
  <rect x="380" y="270" width="100" height="25" rx="3" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
  <text x="430" y="288" font-family="Arial" font-size="12" fill="#FFFFFF" font-weight="bold" text-anchor="middle">COMPLETED</text>
</svg>