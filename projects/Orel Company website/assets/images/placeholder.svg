<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0F0F0" stroke="#DDD" stroke-width="2"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#DDD" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Icon - Construction site -->
  <g transform="translate(200, 120)">
    <!-- Crane -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#999" stroke-width="3"/>
    <rect x="-3" y="0" width="6" height="40" fill="#999"/>
    
    <!-- Hook -->
    <line x1="60" y1="0" x2="60" y2="30" stroke="#666" stroke-width="2"/>
    <circle cx="60" cy="35" r="4" fill="#FF6B35"/>
    
    <!-- Building blocks -->
    <rect x="-40" y="20" width="25" height="30" fill="#CC8844" stroke="#8B6F47" stroke-width="1.5"/>
    <rect x="-10" y="10" width="25" height="40" fill="#CC8844" stroke="#8B6F47" stroke-width="1.5"/>
    <rect x="20" y="25" width="25" height="25" fill="#CC8844" stroke="#8B6F47" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="16" fill="#999" text-anchor="middle" font-weight="bold">Construction Project Image</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="12" fill="#BBB" text-anchor="middle">Project placeholder for gallery</text>
</svg>