<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Keeper Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Professional score tracking app">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="icon">🏆</span>
                    Score Keeper
                </h1>
                <div class="header-controls">
                    <button class="btn-icon" id="settingsBtn" title="Settings">
                        ⚙️
                    </button>
                    <button class="btn-icon" id="themeToggle" title="Toggle theme">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Settings Panel -->
        <section class="settings-panel" id="settingsPanel">
            <div class="settings-content">
                <h3>Game Settings</h3>
                <div class="setting-group">
                    <label for="maxScore">Max Score:</label>
                    <input type="number" id="maxScore" min="1" max="999" value="50">
                </div>
                <div class="setting-group">
                    <label for="foulLimit">Foul Limit:</label>
                    <input type="number" id="foulLimit" min="1" max="20" value="5">
                </div>
                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="soundToggle" checked>
                        Enable Sounds
                    </label>
                </div>
            </div>
        </section>

        <!-- Timer Section -->
        <section class="timer-section">
            <div class="timer-display">
                <div class="timer-main">
                    <span id="timerDisplay">00:00</span>
                    <div class="timer-mode">
                        <button class="mode-btn active" data-mode="countdown">Countdown</button>
                        <button class="mode-btn" data-mode="stopwatch">Stopwatch</button>
                    </div>
                </div>
                <div class="timer-controls">
                    <button class="btn-timer" id="startTimer">▶️ Start</button>
                    <button class="btn-timer" id="pauseTimer">⏸️ Pause</button>
                    <button class="btn-timer" id="resetTimer">⏹️ Reset</button>
                </div>
            </div>
            <div class="timer-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </section>

        <!-- Stats Bar -->
        <section class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Players</span>
                <span class="stat-value" id="playerCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Points</span>
                <span class="stat-value" id="totalPoints">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Fouls</span>
                <span class="stat-value" id="totalFouls">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Leader</span>
                <span class="stat-value" id="leaderName">-</span>
            </div>
        </section>

        <!-- Players Container -->
        <main class="players-container" id="playersContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🎯</div>
                <h3>No players yet</h3>
                <p>Add your first player to start tracking scores!</p>
                <button class="btn-primary" id="addFirstPlayer">Add First Player</button>
            </div>
        </main>

        <!-- Action Buttons -->
        <section class="action-buttons">
            <button class="btn-secondary" id="addPlayerBtn">
                <span>➕</span>
                Add Player
            </button>
            <button class="btn-secondary" id="undoBtn" disabled>
                <span>↶</span>
                Undo
            </button>
            <button class="btn-secondary" id="resetBtn">
                <span>🔄</span>
                Reset All
            </button>
        </section>

        <!-- Add Player Modal -->
        <div class="modal" id="addPlayerModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Player</h3>
                    <button class="close-modal" id="closeModal">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="text" id="playerNameInput" placeholder="Enter player name" maxlength="20">
                    <div class="color-picker">
                        <label>Player Color:</label>
                        <div class="color-options">
                            <div class="color-option selected" data-color="#3b82f6"></div>
                            <div class="color-option" data-color="#ef4444"></div>
                            <div class="color-option" data-color="#10b981"></div>
                            <div class="color-option" data-color="#f59e0b"></div>
                            <div class="color-option" data-color="#8b5cf6"></div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" id="cancelAdd">Cancel</button>
                        <button class="btn-primary" id="confirmAdd">Add Player</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
